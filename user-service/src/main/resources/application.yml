server:
  port: 8082

spring:
  application:
    name: USER-SERVICE

  datasource:
    url: jdbc:mysql://localhost:3306/users_db
    username: root
    password: root

  jpa:
    hibernate:
      ddl-auto: update

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

routes:
  - id: ticket-service
    uri: lb://TICKET-SERVICE
    predicates:
      - Path=/api/tickets/**

  - id: user-service
    uri: lb://USER-SERVICE
    predicates:
      - Path=/api/users/**
    filters:
      - RewritePath=/api/users/(?<segment>.*), /users/${segment}
